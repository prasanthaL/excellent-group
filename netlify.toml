[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20.11.1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  included_files = [
    "prisma/**",
    "node_modules/.prisma/**"
  ]
  external_node_modules = ["@prisma/client", "prisma"]